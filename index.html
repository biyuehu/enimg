<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Tool</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="container">
    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <div class="text">Processing...</div>
    </div>
    <div class="preview">
      <img alt="preview" id="preview">
      <div id="placeholder">
        <div class="icon">🖼️</div>
        <div class="text">No image uploaded yet.</div>
      </div>
    </div>
    <div class="actions">
      <button type="button" id="upload">Upload</button>
      <button type="button" id="encode">Encode</button>
      <button type="button" id="decode">Decode</button>
      <button type="button" id="download">Download</button>
    </div>
  </div>
  <input id="file" type="file" accept="image/*">
  <script type="module" src="src/ts/entry.ts"></script>
</body>

</html>
